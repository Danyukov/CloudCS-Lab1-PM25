version: "3.9"
services:
  postgres:
    image: postgres:15.2
    environment:
      POSTGRES_PASSWORD: $POSTGRES_PASSWORD
      PGDATA: "/var/lib/postgresql/data/pgdata"
    volumes:
      - ./db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres", "-d", "postgres"]
      interval: 5s
      timeout: 10s
      retries: 120
    ports:
      - "8888:5432"
  keycloak:
    image: danyukov/cloud-cs-pm25:keycloak
    build:
      context: ./keycloak/docker
      dockerfile: Dockerfile
    environment:
      KEYCLOAK_ADMIN: "admin"
      KEYCLOAK_ADMIN_PASSWORD: $KEYCLOAK_ADMIN_PASSWORD
      KC_HOSTNAME: keycloak
      KC_HOSTNAME_PORT: "8443"
    command: start --optimized --db-password=$POSTGRES_PASSWORD
    ports:
      - "8443:8443"
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8443"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
  inference:
    image: danyukov/cloud-cs-pm25:inference-service
    build:
      context: .
      dockerfile: docker/Dockerfile
    environment:
      MODEL_PATH: "/models/pipeline.pkl"
      KEYCLOAK_URL: $KEYCLOAK_URL
      CLIENT_ID: $CLIENT_ID
      CLIENT_SECRET: $CLIENT_SECRET
    ports:
      - "8000:8000"
    volumes:
      - ./models:/models
    depends_on:
      keycloak:
        condition: service_healthy
